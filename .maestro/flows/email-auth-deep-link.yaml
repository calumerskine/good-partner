appId: com.pearprogramming.wingmanapp
---
- runFlow: ../utils/launch.yaml

- openLink: "wingmanapp://login"

- assertVisible: "Welcome Back"
- assertVisible: "Sign in to continue your journey"
- assertVisible: "Don't have an account?"
- tapOn: "Sign Up"
- assertVisible: "Create Account"
- assertVisible: "Start building meaningful connections"

- runFlow:
    file: ../utils/signin.yaml
    env:
      EMAIL: ${NEW_USER_PREFIX + Math.floor(Math.random() * 1000) + '@mail.com'}
      PASSWORD: ${TEST_PASSWORD}

# Intentionally stops here — this flow only validates that the deep link
# lands on the sign-in screen and that signing up from there routes to
# onboarding. Full onboarding coverage is in email-auth.yaml.
- assertVisible: "How would you describe your relationship right now?"
