# .maestro/flows/onboarding/happy-path.yaml
# Full end-to-end onboarding flow for a new user.
# Requires: NEW_USER_EMAIL and NEW_USER_PASSWORD env vars.
# seed-e2e-db.sh deletes NEW_USER_EMAIL before each run so this flow can sign up fresh.
appId: com.pearprogramming.wingmanapp
---
- runFlow: ../../utils/launch.yaml

# Welcome — extend timeout to account for sequential loading states
- extendedWaitUntil:
    visible:
      text: "Welcome to"
    timeout: 15000
- assertVisible: "The Good Partner"
- tapOn: "Get Started"

# Transition
- assertVisible: "Three quick questions to make this yours."
- tapOn: "Continue"

# Relationship
- assertVisible: "How would you describe your relationship right now?"
- tapOn: "Really good, I just want to keep growing"
- tapOn: "Continue"

# Focus
- assertVisible: "What would you like to focus on?"
- tapOn:
    id: "focus-ATTENTION"
- tapOn: "Continue"

# Gender
- assertVisible: "About you"
- tapOn: "Man"
- tapOn: "Continue"

# Auth
- assertVisible: "You're all set."
- tapOn:
    id: "email"
- inputText: ${NEW_USER_EMAIL}
- tapOn:
    id: "password"
- inputText: ${NEW_USER_PASSWORD}
- tapOn: "Continue with email"

# Home — header always shows "Day N"
- assertVisible: "Day 1"
