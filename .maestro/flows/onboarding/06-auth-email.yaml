# .maestro/flows/onboarding/06-auth-email.yaml
# Requires: TEST_EMAIL and TEST_PASSWORD env vars
# The test account must already exist in dev Supabase (signUpWithEmail will fail for existing users).
# Run once to create the account, then use 01-signin-email.yaml for subsequent runs.
appId: com.pearprogramming.wingmanapp
---
- runFlow: ../../utils/launch.yaml

# Navigate through onboarding to auth step
- tapOn: "Get Started"
- tapOn: "Continue"
- tapOn: "Mostly solid, but I sense some distance"
- tapOn: "Continue"
- tapOn: "Being more present & connected"
- tapOn: "Continue"
- tapOn: "Prefer not to say"
- tapOn: "Continue"
- assertVisible: "You're all set."
- assertVisible: "Create your account to save your progress."

# Enter credentials
- tapOn:
    id: "email"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password"
- inputText: ${TEST_PASSWORD}

# Submit
- tapOn: "Continue with email"

# Should land on home — header always shows "Day N"
- assertVisible: "Day 1"
