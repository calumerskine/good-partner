appId: com.pearprogramming.wingmanapp
---
- runFlow: ../utils/launch.yaml

# Welcome — extend timeout to account for sequential loading states
- extendedWaitUntil:
    visible:
      text: "Welcome to"
    timeout: 15000
- assertVisible: "The Good Partner"

- runFlow: ../utils/onboarding.yaml

- runFlow:
    file: ../utils/signin.yaml
    env:
      EMAIL: ${ONBOARDED_USER_EMAIL}
      PASSWORD: ${TEST_PASSWORD}

- assertVisible: "Day 1"
