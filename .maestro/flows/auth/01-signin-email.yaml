# .maestro/flows/auth/01-signin-email.yaml
# Requires: TEST_EMAIL and TEST_PASSWORD env vars (account must exist in dev Supabase)
appId: com.pearprogramming.wingmanapp
---
- runFlow: ../../utils/launch.yaml

# Deep link directly to the login screen
- openLink: "wingmanapp://login"

# Verify login screen rendered
- assertVisible: "Welcome Back"
- assertVisible: "Sign in to continue your journey"

# Enter credentials
- tapOn:
    id: "email"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "password"
- inputText: ${TEST_PASSWORD}

# Sign in
- tapOn: "Sign In"

# Should land on home
- assertVisible: "Day 1"
