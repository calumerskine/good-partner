# .maestro/flows/auth/05-apple-signin.yaml
# iOS only — Apple button is not rendered on Android.
# Requires app built with EXPO_PUBLIC_E2E=true — bypasses the Apple SDK.
# The Apple button calls email/password auth under the hood in E2E mode.
# The expo-apple-authentication button renders with type SIGN_UP on this screen,
# which displays as "Sign up with Apple". Update tapOn text if button type changes.
appId: com.pearprogramming.wingmanapp
---
- runFlow: ../../utils/launch.yaml

# Navigate to login screen
- openLink: "wingmanapp://login"
- assertVisible: "Welcome Back"

# Tap Apple button (iOS only — will fail on Android simulator)
- tapOn: "Sign up with Apple"

# E2E bypass: resolves immediately using test account credentials
- assertVisible: "Day 1"
