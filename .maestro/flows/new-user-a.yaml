appId: com.pearprogramming.wingmanapp
---
- runFlow: ../../utils/launch.yaml

# Welcome — extend timeout to account for sequential loading states
- extendedWaitUntil:
    visible:
      text: "Welcome to"
    timeout: 15000
- assertVisible: "The Good Partner"
- assertVisible: "Already have an account?"
- assertVisible: "Sign In"
- tapOn: "Get Started"

# Transition
- assertVisible: "Three quick questions to make this yours."
- tapOn: "Continue"

# Relationship
- assertVisible: "How would you describe your relationship right now?"
- tapOn: "Really good, I just want to keep growing"
- tapOn: "Continue"

# Focus
- assertVisible: "What would you like to focus on?"
- tapOn:
    id: "focus-ATTENTION"
- tapOn: "Continue"

# Gender
- assertVisible: "About you"
- tapOn: "Man"
- tapOn: "Continue"

# Auth
- assertVisible: "You're all set."
- tapOn:
    id: "email"
- inputText: "newuser-a@mail.com"
- tapOn:
    id: "password"
- inputText: "password"
- tapOn: "Continue with email"

- assertVisible: "Day 1"
